# Template text sensors for enum display strings
text_sensor:
  - platform: template
    name: "Operation Mode"
    id: operation_mode_20_00_00_display
    lambda: |-
      if (std::isnan(id(operation_mode_20_00_00).state)) return std::string("--");
      int value = (int)id(operation_mode_20_00_00).state;
      switch(value) {
        case 0: return std::string("Auto");
        case 1: return std::string("Cool");
        case 2: return std::string("Dry");
        case 3: return std::string("Fan");
        case 4: return std::string("Heat");
        default: return std::string("Unknown (").append(to_string(value)).append(")");
      }
    update_interval: 1s

