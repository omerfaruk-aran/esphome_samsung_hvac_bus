## BASIC CONFIGURATION
esphome:
  name: esphome-web-fd4e7c
  friendly_name: samsung_heatpump
  comment: "Samsung AC Heatpump"
  min_version: 2024.11.0
  name_add_mac_suffix: false

# Select chipset and board configuration - in this case M5STACK
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

# [Optional] - Create web interface where you can control the AC from your web browser (without Home Assistant)
web_server:
  port: 80

# Enable logging
logger:
  level: DEBUG

# Enable native API for communication with Home Assistant, this can be removed if you do not plan to use it with Home Assistant
api:

# Enable OTA firmware update, you will be able to upload the firmware over WiFi without connecting the device by cables
ota:
  platform: esphome

# Setup your WiFi password
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Add this if not present:
  manual_ip:
    static_ip: 192.168.1.234
    gateway: 192.168.1.1
    subnet: 255.255.255.0

captive_portal:

# Specify pins used by the board to comunicate with RS485 board - in this case M5STACK
uart:
  id: uart_bus
  tx_pin: GPIO19   # Use GPIO26 for ATOM Tail485 
  rx_pin: GPIO22   # Use GPIO32 for ATOM Tail485
  # For older devices it could also be 2400. But you should start with 9600.
  baud_rate: 9600
  parity: EVEN

## SAMSUNG AC CONFIGURATION

# Import custom component from GitHub
external_components:
#  - source: "github://carltonlane79/esphome_samsung_hvac_bus@eu_heatpump"
  - source: ./components  # Point to the components directory
    components: [samsung_ac]

# Configuration of AC component
samsung_ac:
  id: samsung_ac_controller
  uart_id: uart_bus
  debug_mqtt_host: ""
  debug_mqtt_port: 1883
  debug_mqtt_username: ""
  debug_mqtt_password: ""
  
  # When enabled (set to true), this option will log the messages associated with undefined codes on the device. This is useful for debugging and identifying any unexpected or unknown codes that the device may receive during operation.
  debug_log_undefined_messages: true
  
  # When enabled (set to true), this option logs messages associated with defined codes on the device. This helps in monitoring the behavior of the device by recording the activity related to known, expected codes.
  debug_log_messages: true

  # Capabilities configure the features that all devices of your AC system have (all parts of this section are optional). 
  # All capabilities are off by default, you need to enable only those your devices have.
  # You can override or configure them also on a per-device basis (look below for that).
  capabilities: 
    vertical_swing: false
    horizontal_swing: false

  devices:
    - address: "20.00.00" # Indoor device address 
      capabilities:
        horizontal_swing: false
        vertical_swing: false

      climate:
        name: "Heat Pump climate"
        id: climate_20_00_00

      room_temperature:
        name: "Indoor Temperature"
        id: room_temperature_20_00_00
        accuracy_decimals: 1

      target_temperature:
        name: "Heat Pump target temperature"
        id: target_temperature_20_00_00

      power:
        name: "Heat Pump power"
        id: power_20_00_00

      mode:
        name: "Heat Pump mode"
        id: mode_20_00_00

      operation_mode:
        name: "Operation Mode"
        id: operation_mode_20_00_00
        internal: true
        message: 0x4001

      indoor_eva_in_temperature:
        name: "Evaporator Inlet Water Temperature"
        id: evap_inlet_water_temperature_20_00_00
        accuracy_decimals: 1
        #message: 0x4205

      indoor_eva_out_temperature:
        name: "Evaporator Outlet Water Temperature"
        id: evap_outlet_water_temperature_20_00_00
        accuracy_decimals: 1
        #message: 0x4206

      # Indoor Custom sensors
      custom_sensor:
        - name: "Water Temperature (Heating Loop)"
          message: 0x4236
          id: water_temperature_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement

        - name: "Water Outlet Target Temperature"
          message: 0x4247
          id: water_outlet_target_temperature_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1

        - name: "DHW Operation Enable"
          message: 0x4065
          id: dhw_operation_enable
          internal: true

        - name: "DHW Mode Setting"
          message: 0x4066
          id: dhw_mode_setting
          internal: true

        - name: "DHW Target Temperature"
          message: 0x4235
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          id: dhw_setpoint_temp

        - name: "Backup Heater Status"
          message: 0x406C
          id: dhw_backup_heater_status
          internal: true

        - name: "Booster Heater Status"
          message: 0x4087
          id: dhw_booster_heater_status
          internal: true

        - name: "3-Way Valve Position"
          message: 0x4067
          id: dhw_three_way_valve_position
          internal: true

        - name: "Circulation Pump Speed"
          message: 0x40C4
          unit_of_measurement: "%"
          id: dhw_circulation_pump_speed

        # NOTE: 0x4238 = VAR_IN_TEMP_WATER_OUT_F — Water Outlet temperature (°C, /10)
        # Previously mislabelled "Water Flow Rate" — actual flow is at 0x42E9
        - name: "Water Out Temperature"
          message: 0x4238
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          id: water_out_temp_4238

        # NOTE: 0x4239 = VAR_IN_TEMP_WATER_OUT2_F — Zone 2 water outlet temp (NaN for single-zone)
        # Previously mislabelled "Water Pressure"
        - name: "Water Out 2 Temperature"
          message: 0x4239
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          id: water_out2_temp_4239

        - name: "DHW Tank Temperature"
          message: 0x4237
          id: dhw_tank_temperature_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement

        - name: "Water Flow Rate"
          message: 0x42E9
          id: water_flow_rate_20_00_00
          unit_of_measurement: "L/min" 
          accuracy_decimals: 1

        # --- New Indoor Unit Sensors from Reference Tables ---
        - name: "Zone 2 Room Setpoint"
          message: 0x42D6
          id: zone2_room_setpoint_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1

        - name: "Zone 2 Water Setpoint"
          message: 0x42D7
          id: zone2_water_setpoint_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1

        - name: "Water Outlet Zone 1"
          message: 0x42D8
          id: water_outlet_zone1_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1

        - name: "Water Outlet Zone 2"
          message: 0x42D9
          id: water_outlet_zone2_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1

        - name: "Flow Rate Control %"
          message: 0x42F1
          id: flow_rate_control_20_00_00
          unit_of_measurement: "%"

        - name: "Total Energy Produced"
          message: 0x4427
          id: total_energy_produced_20_00_00
          unit_of_measurement: "kWh"
          accuracy_decimals: 3
          device_class: energy
          state_class: total_increasing
          icon: "mdi:counter"
          filters:
            - multiply: 0.001

        - name: "Water Return Temperature"
          message: 0x4202
          id: water_return_temp_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          filters:
            - multiply: 0.1

        - name: "Outdoor Ambient Controller"
          message: 0x4212
          id: outdoor_ambient_controller_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          filters:
            - multiply: 0.1

        - name: "PHE Inlet Temperature"
          message: 0x4229
          id: phe_inlet_temp_20_00_00
          unit_of_measurement: "°C"
          accuracy_decimals: 1
          device_class: temperature
          state_class: measurement
          filters:
            - multiply: 0.1

        - name: "Seasonal Thermal Energy"
          message: 0x4423
          id: seasonal_thermal_energy_20_00_00
          unit_of_measurement: "kWh"
          accuracy_decimals: 1
          device_class: energy
          state_class: total_increasing
          icon: "mdi:water-boiler"
          filters:
            - multiply: 0.001

        - name: "Seasonal Electrical Energy"
          message: 0x4424
          id: seasonal_electrical_energy_20_00_00
          unit_of_measurement: "kWh"
          accuracy_decimals: 1
          device_class: energy
          state_class: total_increasing
          icon: "mdi:lightning-bolt"
          filters:
            - multiply: 0.001

    - address: "10.00.00" # Outdoor device address
      capabilities:
        horizontal_swing: false
        vertical_swing: false

      outdoor_temperature:
        name: "Outdoor Temperature"
        icon: "mdi:thermometer"
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        accuracy_decimals: 1
        id: outdoor_temperature_10_00_00

      outdoor_current:
        name: "Outdoor Current"
        icon: "mdi:current-ac"
        device_class: current
        state_class: measurement
        unit_of_measurement: "A"
        accuracy_decimals: 1
        id: outdoor_current_10_00_00

      power:
        name: "Outdoor Power"
        icon: "mdi:flash"
        id: power_10_00_00

      error_code:
        name: "Error Code"
        icon: "mdi:alert-circle"
        id: error_code_10_00_00
        message: 0x8235

      fan_power:
        name: "Fan Power"
        id: fan_power_10_00_00
        message: 0x8239

      total_power:
        name: "Total Power"
        id: total_power_10_00_00
        message: 0x823d

      phase_current:
        name: "Phase Current"
        id: phase_current_10_00_00
        message: 0x82db
        
      phase_voltage:
        name: "DC Bus Voltage"
        id: phase_voltage_10_00_00
        message: 0x82de
        unit_of_measurement: "V"

      phase_power:
        name: "Phase Power"
        id: phase_power_10_00_00
        message: 0x82df

      # NOTE: 0x82E8 = MCU HR bypass EEV steps (not power factor) — value observed: 0
      power_factor:
        name: "MCU HR Bypass EEV"
        id: power_factor_10_00_00
        message: 0x82e8
        unit_of_measurement: "steps"

      system_efficiency:
        name: "System Efficiency"
        id: system_efficiency_10_00_00
        message: 0x82ed
        unit_of_measurement: "COP"
        accuracy_decimals: 4

      system_capacity:
        name: "System Capacity"
        id: system_capacity_10_00_00
        message: 0x82f6
        unit_of_measurement: "kW"

      total_energy_consumption:
        name: "Daily Energy Generation"
        id: total_energy_consumption_10_00_00
        message: 0x8408
        unit_of_measurement: "kWh"
        accuracy_decimals: 1
        device_class: energy
        state_class: measurement
        icon: "mdi:solar-power"


      compressor_hours:
        name: "Compressor Hours"
        id: compressor_hours_10_00_00
        message: 0x840c
        unit_of_measurement: "h"
        accuracy_decimals: 1
        state_class: total_increasing
        icon: "mdi:clock-outline"

      fan_hours:
        name: "Fan Hours"
        id: fan_hours_10_00_00
        message: 0x841a
        unit_of_measurement: "h"
        accuracy_decimals: 1
        state_class: total_increasing
        icon: "mdi:clock-outline"

      # NOTE: 0x8411 = NASA_OUTDOOR_CONTROL_WATTMETER_1UNIT = instantaneous ODU power in W (raw, no /1000)
      # Previously mislabelled as kWh — actual observed value 1503 = 1503W
      control_wattmeter_unit:
        name: "ODU Instantaneous Power"
        id: control_wattmeter_unit_10_00_00
        message: 0x8411
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        accuracy_decimals: 0
        icon: "mdi:flash"

      wattmeter_accumulated:
        name: "Wattmeter Accumulated"
        id: wattmeter_accumulated_10_00_00
        message: 0x8416
        unit_of_measurement: "kWh"
        accuracy_decimals: 3
        device_class: energy
        state_class: total_increasing
        icon: "mdi:counter"

      custom_sensor:
        - name: "Operation Hours"
          message: 0x8287
          id: operation_hours_10_00_00
          unit_of_measurement: "h"
          accuracy_decimals: 1
          state_class: total_increasing
          icon: "mdi:clock-outline"

        # NOTE: 0x8236/8237/8238 = compressor frequency chain:
        #   8236 = VAR_OUT_CONTROL_ORDER_CFREQ_COMP1  = ordered/commanded freq (Hz)
        #   8237 = VAR_OUT_CONTROL_TARGET_CFREQ_COMP1 = target freq after limiting (Hz)
        #   8238 = VAR_OUT_CONTROL_CFREQ_COMP1        = actual running freq (Hz)
        # Previously mislabelled 8236 as "Compressor Current" and 8237 as "Compressor Power"
        - name: "Compressor Ordered Frequency"
          message: 0x8236
          id: compressor_ordered_freq_10_00_00
          unit_of_measurement: "Hz"
          state_class: measurement
          icon: "mdi:sine-wave"

        - name: "Compressor Target Frequency"
          message: 0x8237
