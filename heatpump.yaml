# Template text sensors for enum display strings
text_sensor:
  - platform: template
    name: "Operation Mode Display"
    id: operation_mode_20_00_00_display
    lambda: |-
      int value = (int)id(operation_mode_20_00_00).state;
      switch(value) {
        case 0: return std::string("Auto");
        case 1: return std::string("Cool");
        case 2: return std::string("Dry");
        case 3: return std::string("Fan");
        case 4: return std::string("Heat");
        default: return std::string("Unknown (").append(to_string(value)).append(")");
      }
    update_interval: 1s

  - platform: template
    name: "DHW Operation Enable Display"
    id: dhw_operation_enable_display
    lambda: |-
      int value = (int)id(dhw_operation_enable).state;
      return value != 0 ? std::string("On") : std::string("Off");
    update_interval: 1s

  - platform: template
    name: "DHW Mode Setting Display"
    id: dhw_mode_setting_display
    lambda: |-
      int value = (int)id(dhw_mode_setting).state;
      switch(value) {
        case 0: return std::string("Eco");
        case 1: return std::string("Standard");
        case 2: return std::string("Power");
        case 3: return std::string("Force");
        default: return std::string("Unknown (").append(to_string(value)).append(")");
      }
    update_interval: 1s

  - platform: template
    name: "3-Way Valve Position Display"
    id: dhw_three_way_valve_position_display
    lambda: |-
      int value = (int)id(dhw_three_way_valve_position).state;
      switch(value) {
        case 0: return std::string("Off/Closed");
        case 1: return std::string("Heating Loop");
        case 2: return std::string("DHW Loop");
        case 3: return std::string("Both Loops");
        case 9: return std::string("Unknown Position 9");
        default: return std::string("Position ").append(to_string(value));
