## BASIC CONFIGURATION
esphome:
  name: esphome-web-fd4e7c
  friendly_name: samsung_heatpump
  comment: "Samsung AC Heatpump"
  min_version: 2024.11.0
  name_add_mac_suffix: false

# Select chipset and board configuration - in this case M5STACK
esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

# [Optional] - Create web interface where you can control the AC from your web browser (without Home Assistant)
web_server:
  port: 80

# Enable logging
logger:
  level: DEBUG

# Enable native API for communication with Home Assistant, this can be removed if you do not plan to use it with Home Assistant
api:

# Enable OTA firmware update, you will be able to upload the firmware over WiFi without connecting the device by cables
ota:
  platform: esphome

# Setup your WiFi password
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Add this if not present:
  manual_ip:
    static_ip: 192.168.1.234
    gateway: 192.168.1.1
    subnet: 255.255.255.0

captive_portal:

# Specify pins used by the board to comunicate with RS485 board - in this case M5STACK
uart:
  id: uart_bus
  tx_pin: GPIO19   # Use GPIO26 for ATOM Tail485 
  rx_pin: GPIO22   # Use GPIO32 for ATOM Tail485
  # For older devices it could also be 2400. But you should start with 9600.
  baud_rate: 9600
  parity: EVEN

## SAMSUNG AC CONFIGURATION

# Import custom component from GitHub
external_components:
  - source: ./components  # Point to the components directory
    components: [samsung_ac]

# Configuration of AC component
samsung_ac:
  id: samsung_ac_controller
  uart_id: uart_bus
  debug_mqtt_host: ""
  debug_mqtt_port: 1883
  debug_mqtt_username: ""
  debug_mqtt_password: ""
  
  # When enabled (set to true), this option will log the messages associated with undefined codes on the device. This is useful for debugging and identifying any unexpected or unknown codes that the device may receive during operation.
  debug_log_undefined_messages: true
  
  # When enabled (set to true), this option logs messages associated with defined codes on the device. This helps in monitoring the behavior of the device by recording the activity related to known, expected codes.
  debug_log_messages: true

  # Capabilities configure the features that all devices of your AC system have (all parts of this section are optional). 
  # All capabilities are off by default, you need to enable only those your devices have.
  # You can override or configure them also on a per-device basis (look below for that).
  capabilities: 
    vertical_swing: false
    horizontal_swing: false

  devices:
    - address: "20.00.00" # Indoor device address 
      capabilities:
        horizontal_swing: false
        vertical_swing: false

      climate:
        name: "Heat Pump climate"
        id: climate_20_00_00

      room_temperature:
        name: "Indoor Temperature"
        id: room_temperature_20_00_00
      target_temperature:
        name: "Heat Pump target temperature"
        id: target_temperature_20_00_00
      power:
        name: "Heat Pump power"
        id: power_20_00_00
      mode:
        name: "Heat Pump mode"
        id: mode_20_00_00

      room_temperature_offset: -1.4

            # Add these under the first device in samsung_ac: devices:
      compressor_power:
        name: "Compressor Power"
        id: compressor_power_20_00_00
      fan_power:
        name: "Fan Power"
        id: fan_power_20_00_00
      total_power:
        name: "Total Power"
        id: total_power_20_00_00
      compressor_current:
        name: "Compressor Current"
        id: compressor_current_20_00_00
      fan_current:
        name: "Fan Current"
        id: fan_current_20_00_00
      phase_current:
        name: "Phase Current"
        id: phase_current_20_00_00
      phase_voltage:
        name: "Phase Voltage"
        id: phase_voltage_20_00_00
      phase_power:
        name: "Phase Power"
        id: phase_power_20_00_00
      power_factor:
        name: "Power Factor"
        id: power_factor_20_00_00
      system_efficiency:
        name: "System Efficiency"
        id: system_efficiency_20_00_00
      system_capacity:
        name: "System Capacity"
        id: system_capacity_20_00_00
      total_energy_consumption:
        name: "Total Energy Consumption"
        id: total_energy_consumption_20_00_00
      operation_hours:
        name: "Operation Hours"
        id: operation_hours_20_00_00
      compressor_hours:
        name: "Compressor Hours"
        id: compressor_hours_20_00_00
      fan_hours:
        name: "Fan Hours"
        id: fan_hours_20_00_00
      control_wattmeter_unit:
        name: "Control Wattmeter Unit"
        id: control_wattmeter_unit_20_00_00
      wattmeter_accumulated:
        name: "Wattmeter Accumulated"
        id: wattmeter_accumulated_20_00_00
      produced_energy_actual:
        name: "Produced Energy Actual"
        id: produced_energy_actual_20_00_00
      produced_energy_total:
        name: "Produced Energy Total"
        id: produced_energy_total_20_00_00

      # DHW (Domestic Hot Water) custom sensors
      custom_sensor:
        - name: "DHW Operation Enable"
          message: 0x4065
          id: dhw_operation_enable
        - name: "DHW Mode Setting"
          message: 0x4066
          id: dhw_mode_setting
        - name: "DHW Setpoint Temperature"
          message: 0x4235
          unit_of_measurement: "°C"
          filters:
            - multiply: 0.1
          id: dhw_setpoint_temp
        - name: "DHW Tank Temperature"
          message: 0x4236
          unit_of_measurement: "°C"
          id: dhw_tank_temp
        - name: "Backup Heater Status (DHW)"
          message: 0x406C
          id: dhw_backup_heater_status
        - name: "Booster Heater Status (DHW)"
          message: 0x4087
          id: dhw_booster_heater_status
        - name: "3-Way Valve Position"
          message: 0x4067
          id: dhw_three_way_valve_position
        - name: "Circulation Pump Speed"
          message: 0x40C4
          unit_of_measurement: "%"
          id: dhw_circulation_pump_speed
        - name: "Water Flow Rate"
          message: 0x42E9
          unit_of_measurement: "L/min"
          id: dhw_water_flow_rate
        - name: "Heat Pump Operation Mode"
          message: 0x8001
          id: dhw_heat_pump_operation_mode


    - address: "10.00.00" # Outdoor device address
      capabilities:
        horizontal_swing: false
        vertical_swing: false

      outdoor_temperature:
        name: "Outdoor Temperature"
        icon: "mdi:thermometer"
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        accuracy_decimals: 1
        id: outdoor_temperature_10_00_00
      outdoor_current:
        name: "Outdoor Current"
        icon: "mdi:current-ac"
        device_class: current
        state_class: measurement
        unit_of_measurement: "A"
        accuracy_decimals: 1
        id: outdoor_current_10_00_00
      power:
        name: "Outdoor Power"
        icon: "mdi:flash"
        id: power_10_00_00
      error_code:
        name: "Error Code"
        icon: "mdi:alert-circle"
        id: error_code_10_00_00
      water_temperature:
        name: "Water Temperature"
        icon: "mdi:thermometer-water"
        device_class: temperature
        state_class: measurement
        unit_of_measurement: "°C"
        accuracy_decimals: 1
        id: water_temperature_10_00_00
      water_target_temperature:
        name: "Water Target Temperature"
        icon: "mdi:thermometer-water"
        device_class: temperature
        unit_of_measurement: "°C"
        id: water_target_temperature_10_00_00
