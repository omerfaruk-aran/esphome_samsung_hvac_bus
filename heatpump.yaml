          state_class: measurement
          icon: "mdi:sine-wave"

        - name: "Compressor Actual Frequency"
          message: 0x8238
          id: compressor_actual_freq_10_00_00
          unit_of_measurement: "Hz"
          state_class: measurement
          icon: "mdi:sine-wave"

        - name: "Outdoor Air Sensor (Airout)"
          message: 0x8204
          id: outdoor_air_sensor_10_00_00
          unit_of_measurement: "°C"
            
        - name: "Defrost Mode"
          id: defrost_mode_10_00_00
          message: 0x8031
          icon: "mdi:snowflake-melt"
          unit_of_measurement: "mode"
          internal: true

        - name: "Produced Energy Actual"
          id: produced_energy_actual_10_00_00
          message: 0x8426
          unit_of_measurement: "kWh"
          accuracy_decimals: 3
          device_class: energy
          state_class: total_increasing
          icon: "mdi:counter"

        - name: "Produced Energy Total"
          id: produced_energy_total_10_00_00
          message: 0x8404
          unit_of_measurement: "kWh"
          accuracy_decimals: 3
          device_class: energy
          state_class: total_increasing
          icon: "mdi:counter"
          filters:
            - lambda: "return x > 1000000 ? NAN : x;"

        # --- New Outdoor Unit Sensors from Reference Tables ---
        - name: "Operation Mode"
          message: 0x8001
          id: operation_mode_10_00_00
          unit_of_measurement: "enum"
          internal: true

        - name: "Heat/Cool Mode"
